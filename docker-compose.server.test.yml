services:
  stefan-db-test:
    image: stefan-db:test
    restart: "no"
    environment:
      POSTGRES_DB: stefan_db
      POSTGRES_USER: stefan
      POSTGRES_PASSWORD: changeme
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stefan -d stefan_db"]
      interval: 2s
      timeout: 2s
      retries: 30

  stefan-server-test:
    image: stefan-server:test
    restart: "no"
    ports:
      - "${LOCAL_PORT:-5285}:8080"
    depends_on:
      stefan-db-test:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__StefanDb: "Host=stefan-db-test;Port=5432;Database=stefan_db;Username=stefan;Password=changeme"
      Cors__Dashboard__AllowedOrigins: ${CORS_ORIGIN:-http://localhost}
      NodeSecret: ${NODE_SECRET:-test-secret}
      OpenAI__ApiKey: ${OPENAI_API_KEY:-test-dummy}
      SttProvider: XAi
      TtsProvider: XAi
      xAI__ApiKey: ${XAI_API_KEY:-test-dummy}