services:
  stefan-node-test:
    image: stefan-node:test
    restart: "no"
    ports:
      - "${LOCAL_PORT:-8080}:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      Node__Name: ${NODE_NAME:-stefan-node-test}
      Server__Url: ${SERVER_URL:-http://0.0.0.0:8080}
      RemoteServer__Url: ${REMOTE_SERVER_URL:?REMOTE_SERVER_URL is required}
      RemoteServer__AuthSecret: ${REMOTE_SERVER_AUTH_SECRET:?REMOTE_SERVER_AUTH_SECRET is required}
      Audio__InputSource: pipe
      Audio__PipePath: /tmp/audio-pipes/${PIPE_ID:-default}/audio-input
      Audio__Test__Files__0: ${TEST_WAKE_WORD_FILE:-/test-audio/wake-word.wav}
      Audio__Test__Files__1: ${TEST_COMMAND_FILE:-/test-audio/command.wav}
      Audio__Test__SilenceAfterMs: ${AUDIO_TEST_SILENCE_AFTER_MS:-3000}
      Audio__Input__SampleRate: ${AUDIO_INPUT_SAMPLE_RATE:-16000}
      Audio__Input__Channels: ${AUDIO_INPUT_CHANNELS:-2}
      Audio__Input__BitsPerSample: ${AUDIO_INPUT_BITS_PER_SAMPLE:-16}
      Audio__Output__DeviceName: null
      Audio__SilenceThreshold: ${AUDIO_SILENCE_THRESHOLD:-0.02}
      Audio__SilenceTimeoutMs: ${AUDIO_SILENCE_TIMEOUT_MS:-1000}
      Audio__MaxRecordingMs: ${AUDIO_MAX_RECORDING_MS:-10000}
      KeywordSpotter__NumThreads: ${KEYWORD_SPOTTER_NUM_THREADS:-2}
      KeywordSpotter__Provider: ${KEYWORD_SPOTTER_PROVIDER:-cpu}
      KeywordSpotter__FeatureDim: ${KEYWORD_SPOTTER_FEATURE_DIM:-80}
    volumes:
      - ./test-audio:/test-audio:ro
      - ./audio-pipes:/tmp/audio-pipes
