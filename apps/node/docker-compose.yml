services:
  node:
    build: .
    env_file: .env
    restart: unless-stopped

    # Pass host sound devices into the container
    devices:
      - /dev/snd:/dev/snd

    # Access to ALSA / sound hardware
    group_add:
      - audio

    ports:
      - "${LOCAL_SERVER_PORT:-8080}:${LOCAL_SERVER_PORT:-8080}"

    volumes:
      - ./recordings:/app/recordings
      - ./models:/app/models
