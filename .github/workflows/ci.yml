name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  server:
    name: Server (.NET)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Restore dependencies
        run: dotnet restore Stefan.sln

      - name: Build
        run: dotnet build src/server/Stefan.Server.API/Stefan.Server.API.csproj --no-restore --configuration Release

      - name: Test
        run: dotnet test tests/server/Stefan.Server.Domain.UnitTests/Stefan.Server.Domain.UnitTests.csproj --configuration Release --verbosity normal

  node:
    name: Node (.NET)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Restore dependencies
        run: dotnet restore Stefan.sln

      - name: Build
        run: dotnet build src/node/Stefan.Node/Stefan.Node.csproj --no-restore --configuration Release

      - name: Test
        run: dotnet test tests/node/Stefan.Node.UnitTests/Stefan.Node.UnitTests.csproj --configuration Release --verbosity normal
