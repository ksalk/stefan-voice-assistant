name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  server:
    name: Server (.NET)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Restore dependencies
        run: dotnet restore src/server/Stefan.Server.API/Stefan.Server.API.csproj

      - name: Build
        run: dotnet build src/server/Stefan.Server.API/Stefan.Server.API.csproj --no-restore --configuration Release

  node:
    name: Node (.NET)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Restore dependencies
        run: dotnet restore src/node/Stefan.Node/Stefan.Node.csproj

      - name: Build
        run: dotnet build src/node/Stefan.Node/Stefan.Node.csproj --no-restore --configuration Release
